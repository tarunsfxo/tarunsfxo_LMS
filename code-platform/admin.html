<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Question | Tarunsfxo LMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-text">Admin</div>
            </div>
            <div class="q-nav">
                <a href="index.html" class="q-item" title="Back to Platform" style="text-decoration: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <div class="q-item active" title="Add Question">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
                <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </aside>

        <!-- Admin Workspace -->
        <main class="workspace" style="display: block;">
            <section class="glass-panel admin-container scrollable">
                <div class="admin-header">
                    <h2>Add New Question</h2>
                    <p class="text-muted">Create a new coding challenge for the platform.</p>
                </div>
                
                <form class="admin-form" onsubmit="event.preventDefault(); showToast('Question added successfully!'); this.reset();">
                    <div class="form-group">
                        <label class="form-label">Question Title</label>
                        <input type="text" class="form-control" placeholder="e.g., JAVA-PT-L2-A1" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Difficulty</label>
                        <select class="form-control">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Problem Description (Markdown Supported)</label>
                        <textarea class="form-control" placeholder="Write a program to check if a number is a Strong Number." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Starter Code</label>
                        <textarea class="form-control" placeholder="public class Main { ... }"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Test Case (Input -> Expected Output)</label>
                        <div style="display: flex; gap: 16px;">
                            <input type="text" class="form-control" placeholder="Input (e.g., 145)" style="flex: 1;" required>
                            <input type="text" class="form-control" placeholder="Expected Output (e.g., true)" style="flex: 1;" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 8px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Save Question
                    </button>
                </form>
            </section>
        </main>
    </div>
    
    <div id="toast" class="toast">Execution Complete</div>
    
    <script src="script.js"></script>
</body>
</html>
