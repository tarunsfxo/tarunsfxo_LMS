{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <h2 class="text-center">Forgot Password</h2>
    <p class="muted text-center mb-3">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
  </div>
</div>
{% endblock %}
