{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--surface-alt);">
  <div class="card form-card" style="border-radius:20px;padding:44px 36px;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🔐</div>
      <h2 style="font-weight:800;font-size:1.5rem;margin-bottom:6px;">Forgot Password</h2>
      <p class="muted" style="margin:0;font-size:0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
    </div>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com" style="border-radius:10px;padding:12px 16px;">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="border-radius:10px;">Send Reset Link →</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('auth.login') }}" style="color:var(--primary-dark);font-weight:600;">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
