{% extends "base.html" %}
{% block content %}
<!-- Mobile Admin Bar -->
<div class="admin-mobile-header">
  <button id="adminMenuToggle" class="admin-menu-toggle-btn" aria-label="Toggle Admin Menu">
    ⚙️ Menu
  </button>
  <span class="admin-mobile-title">Admin Dashboard</span>
</div>

<!-- Backdrop Overlay for Mobile Sidebar Drawer -->
<div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}">📊 Overview</a>
    <a href="{{ url_for('admin.manage_bites') }}" class="{% if request.endpoint and 'bite' in request.endpoint %}active{% endif %}">📚 Bites</a>
    <a href="{{ url_for('admin.manage_courses') }}" class="{% if request.endpoint == 'admin.manage_courses' %}active{% endif %}">🎓 Courses</a>
    <a href="{{ url_for('admin.manage_categories') }}" class="{% if request.endpoint == 'admin.manage_categories' %}active{% endif %}">🏷️ Categories</a>
    <a href="{{ url_for('admin.manage_users') }}" class="{% if request.endpoint == 'admin.manage_users' %}active{% endif %}">👥 Users</a>
    <a href="{{ url_for('admin.manage_payments') }}" class="{% if request.endpoint == 'admin.manage_payments' %}active{% endif %}">💳 Payments</a>
    <a href="{{ url_for('admin.coding_admin') }}" class="{% if request.endpoint == 'admin.coding_admin' %}active{% endif %}">💻 Practice</a>
    <a href="{{ url_for('admin.manage_xp_log') }}" class="{% if request.endpoint == 'admin.manage_xp_log' %}active{% endif %}">⚡ XP Log</a>
    <a href="{{ url_for('admin.manage_sessions') }}" class="{% if request.endpoint == 'admin.manage_sessions' %}active{% endif %}">🕒 Sessions</a>
    
    <div class="admin-sidebar-divider" style="margin: 15px 0; border-top: 1px solid var(--border); width: 100%;"></div>
    <a href="{{ url_for('n8n.automation_dashboard') }}" class="{% if request.endpoint and 'n8n' in request.endpoint %}active{% endif %}">⚡ Automation</a>
    <a href="{{ url_for('n8n.automation_logs') }}" class="{% if request.endpoint == 'n8n.automation_logs' %}active{% endif %}">📜 Event Logs</a>
    <a href="{{ url_for('n8n.api_docs') }}" class="{% if request.endpoint == 'n8n.api_docs' %}active{% endif %}">🤖 n8n Setup</a>
    <div class="admin-sidebar-divider" style="margin: 15px 0; border-top: 1px solid var(--border); width: 100%;"></div>
    
    <a href="{{ url_for('main.index') }}">← Back to Site</a>
  </aside>
  <div class="admin-content">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
