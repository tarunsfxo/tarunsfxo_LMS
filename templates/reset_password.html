{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--surface-alt);">
  <div class="card form-card" style="border-radius:20px;padding:44px 36px;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🔑</div>
      <h2 style="font-weight:800;font-size:1.5rem;margin-bottom:6px;">Reset Password</h2>
      <p class="muted" style="margin:0;font-size:0.9rem;">Enter your new password below.</p>
    </div>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required autofocus placeholder="Enter new password" style="border-radius:10px;padding:12px 16px;">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Confirm new password" style="border-radius:10px;padding:12px 16px;">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="border-radius:10px;">Update Password →</button>
    </form>
  </div>
</div>
{% endblock %}
