<div style="font-family:'Segoe UI',Roboto,sans-serif;max-width:600px;margin:0 auto;background:#0a1628;color:#e0e0e0;border-radius:12px;overflow:hidden;">
  <div style="background:linear-gradient(135deg,#8b5cf6,#a855f7);padding:24px;text-align:center;">
    <h2 style="color:#fff;margin:0;">📊 Your Weekly Report</h2>
  </div>
  <div style="padding:24px;">
    <p>Hi <strong>{{ username }}</strong>, here's your learning summary for this week:</p>
    <div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:16px;margin:16px 0;">
      <p>⏱️ Learning Hours: <strong>{{ hours }}</strong></p>
      <p>📚 Lessons Completed: <strong>{{ lessons }}</strong></p>
      <p>📝 Quizzes Taken: <strong>{{ quizzes }}</strong></p>
      <p>⭐ XP Earned: <strong>{{ xp }}</strong></p>
    </div>
    <p style="color:#888;">{{ summary }}</p>
  </div>
</div>
