services:
  - type: web
    name: devbites
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask bootstrap-db
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: devbites-db
          property: connectionString

databases:
  - name: devbites-db
