services:
  - type: web
    name: tarunsfxo-lms
    runtime: docker
    preDeployCommand: python -m flask bootstrap-db
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: tarunsfxo-lms-db
          property: connectionString

databases:
  - name: tarunsfxo-lms-db
